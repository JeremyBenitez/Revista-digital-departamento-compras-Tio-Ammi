<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Tío Ammi - Imágenes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; }
        #lista-imagenes img { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .btn-like { background: #e91e63; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; margin: 20px 0; }

        .recurso-item button:hover {
            opacity: 0.7;
        }
        .recurso-item span {
            font-weight: bold;
            margin-left: 5px;
            color: #555;
        }
        .form-feedback { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 20px; }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }

        .btn-video { background: #ff0000; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        video { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }

    </style>
</head>
<body>


    <div class="container">
        <h1 id="title">Cargando...</h1>
        <p id="info"></p>
        
        <div id="lista-imagenes"></div>

        <div class="form-feedback">
            <h3>¿Qué te pareció?</h3>
            <input type="number" id="rating" placeholder="Estrellas (1-5)" min="1" max="5">
            <textarea id="comment" placeholder="Tu comentario..."></textarea>
            <button style="background:#25d366; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer;" 
                    onclick="enviarFeedback()">Enviar a WhatsApp</button>
        </div>
    </div>

    <hr>
        <div id="seccion-historial" style="margin-top: 30px; text-align: left;">
            <h3>Ediciones Anteriores</h3>
            <div id="lista-historial">Cargando historial...</div>
        </div>

    <script>
let catalogId = "";
const API_BASE = "http://10.100.39.54:8000"; // Cambia a tu IP si pruebas desde otra PC

        // 1. Cargar el Catálogo Activo (El último subido)
        async function loadCurrentCatalog() {
            try {
                const res = await fetch(`${API_BASE}/catalog/current`);
                if (!res.ok) {
                    document.getElementById('title').innerText = "No hay catálogos activos";
                    return;
                }

                const data = await res.json();
                catalogId = data._id;
                document.getElementById('title').innerText = data.name;
                document.getElementById('info').innerText = `${data.month} ${data.year}`;
                
                const container = document.getElementById('lista-imagenes');
                container.innerHTML = ""; 

                // RENDERIZAR IMÁGENES CON REACCIONES INDIVIDUALES
                data.images.forEach(item => {
                    // Si item es un string (viejo), lo usamos directo. Si es objeto (nuevo), usamos .url
                    const url = typeof item === 'string' ? item : item.url;
                    const likes = item.likes || 0;
                    const dislikes = item.dislikes || 0;
                    
                    const wrapper = crearContenedorRecurso(url, "image", likes, dislikes);
                    container.appendChild(wrapper);
                });

                // HACER LO MISMO PARA EL VIDEO
                if (data.video_url) {
                    const vUrl = typeof data.video_url === 'string' ? data.video_url : data.video_url.url;
                    const vL = data.video_url.likes || 0;
                    const vD = data.video_url.dislikes || 0;
                    
                    const videoWrapper = crearContenedorRecurso(vUrl, "video", vL, vD);
                    container.appendChild(videoWrapper);
                }

                await loadHistory();
                // Registrar vista general
                fetch(`${API_BASE}/catalog/${catalogId}/view`, {method: 'POST'});

            } catch (err) {
                console.error("Error:", err);
                document.getElementById('title').innerText = "Error de conexión";
            }
        }

        function crearContenedorRecurso(url, tipo, likes, dislikes) {
            const div = document.createElement('div');
            div.className = "recurso-item";
            div.style = "margin-bottom: 30px; background: #fff; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";

            let mediaHtml = "";
            if (tipo === "image") {
                mediaHtml = `<img src="${API_BASE}${url}" style="width: 100%; border-radius: 8px;">`;
            } else {
                mediaHtml = `
                    <button class="btn-video" id="btn-vid" onclick="this.nextElementSibling.style.display='block'; this.style.display='none'; this.nextElementSibling.play()">🎬 VER VIDEO DEL CATÁLOGO</button>
                    <video controls style="width:100%; border-radius:10px; display:none;"><source src="${API_BASE}${url}" type="video/mp4"></video>`;
            }

            div.innerHTML = `
                ${mediaHtml}
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
                    <button onclick="reaccionar('${url}', 'like', this)" style="border:none; background:none; cursor:pointer; font-size: 1.2em;">❤️ <span>${likes}</span></button>
                    <button onclick="reaccionar('${url}', 'dislike', this)" style="border:none; background:none; cursor:pointer; font-size: 1.2em;">👎 <span>${dislikes}</span></button>
                </div>
            `;
            return div;
        }

// 3. Nueva función para enviar la reacción individual
        async function reaccionar(fileUrl, tipo, boton) {
            if(!catalogId) return;
            
            const formData = new FormData();
            formData.append('file_url', fileUrl);
            formData.append('type', tipo);

            try {
                const res = await fetch(`${API_BASE}/catalog/${catalogId}/react`, {
                    method: 'POST',
                    body: formData
                });

                if(res.ok) {
                    // Actualizar el número visualmente sin recargar
                    const span = boton.querySelector('span');
                    span.innerText = parseInt(span.innerText) + 1;
                    boton.style.transform = "scale(1.2)";
                    setTimeout(() => boton.style.transform = "scale(1)", 200);
                }
            } catch (err) {
                console.error("Error al reaccionar");
            }
        }



        // 2. Cargar el Historial de Catálogos (Los que tienen is_active: false)
        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/catalog/history`);
                const history = await res.json();
                const divHistorial = document.getElementById('lista-historial');
                
                if (!history || history.length === 0) {
                    divHistorial.innerHTML = "<p style='color:gray;'>No hay ediciones anteriores.</p>";
                    return;
                }

                let html = "<ul style='list-style: none; padding: 0;'>";
                history.forEach((cat) => {
                    // Guardamos el ID en un atributo de datos para evitar problemas con JSON complejo
                    html += `
                    <li onclick="cargarCatalogoDesdeHistorial('${cat._id}')" 
                        style="padding: 15px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s;"
                        onmouseover="this.style.background='#f0f0f0'" 
                        onmouseout="this.style.background='#fff'">
                        <strong style="color: #333;">${cat.name}</strong><br>
                        <span style="font-size: 0.9em; color: #666;">${cat.month} ${cat.year}</span>
                    </li>`;
                });
                html += "</ul>";
                divHistorial.innerHTML = html;
            } catch (err) {
                console.log("Error al cargar historial:", err);
            }
        }

        async function cargarCatalogoDesdeHistorial(id) {
            try {
                // Buscamos en el historial el catálogo que coincida con el ID
                const res = await fetch(`${API_BASE}/catalog/history`);
                const history = await res.json();
                const data = history.find(c => c._id === id);

                if (data) {
                    catalogId = data._id;
                    document.getElementById('title').innerText = data.name;
                    document.getElementById('info').innerText = `${data.month} ${data.year} (Edición Anterior)`;
                    
                    const container = document.getElementById('lista-imagenes');
                    container.innerHTML = ""; 

                    // Renderizar con la nueva lógica de objetos
                    data.images.forEach(item => {
                        const url = typeof item === 'string' ? item : item.url;
                        const l = item.likes || 0;
                        const d = item.dislikes || 0;
                        const wrapper = crearContenedorRecurso(url, "image", l, d);
                        container.appendChild(wrapper);
                    });

                    if (data.video_url) {
                        const vUrl = typeof data.video_url === 'string' ? data.video_url : data.video_url.url;
                        const vL = data.video_url.likes || 0;
                        const vD = data.video_url.dislikes || 0;
                        const videoWrapper = crearContenedorRecurso(vUrl, "video", vL, vD);
                        container.appendChild(videoWrapper);
                    }
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (err) {
                console.error("Error al cargar catálogo antiguo:", err);
            }
        }



        function mostrarCatalogoAntiguo(id, nombre, imagenes) {
            catalogId = id;
            document.getElementById('title').innerText = nombre;
            document.getElementById('info').innerText = "(Edición Anterior)";

            const container = document.getElementById('lista-imagenes');
            container.innerHTML = ""; 

            if (imagenes && imagenes.length > 0) {
                imagenes.forEach(item => {
                    // Verificamos si es el formato nuevo (objeto) o el viejo (string)
                    // para que tus catálogos viejos sigan funcionando
                    const url = typeof item === 'string' ? item : item.url;
                    const likes = item.likes || 0;
                    const dislikes = item.dislikes || 0;

                    const wrapper = crearContenedorRecurso(url, "image", likes, dislikes);
                    container.appendChild(wrapper);
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                container.innerHTML = "<p>Este catálogo no tiene imágenes disponibles.</p>";
            }
        }


        async function enviarFeedback() {
            if(!catalogId) return;
            
            const r = document.getElementById('rating').value;
            const c = document.getElementById('comment').value;

            if(!r || !c) {
                alert("Por favor, califica con estrellas y escribe un comentario.");
                return;
            }

            const formData = new FormData();
            formData.append('rating', r);
            formData.append('comment', c);

            try {
                const res = await fetch(`${API_BASE}/catalog/${catalogId}/feedback`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                // Redirigir a WhatsApp
                if(data.whatsapp_link) {
                    window.location.href = data.whatsapp_link;
                }
            } catch (err) {
                console.error("Error al enviar feedback:", err);
                alert("Hubo un problema al conectar con WhatsApp.");
            }
        }
        loadCurrentCatalog();
    </script>
</body>
</html>
