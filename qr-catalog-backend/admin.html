<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Tío Ammi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .admin-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input[type="text"], input[type="number"], select, input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
        }
        .btn-submit { background-color: #d32f2f; color: white; border: none; padding: 15px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .btn-submit:hover { background-color: #b71c1c; }
        #status-message { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Cargar Nuevo Catálogo</h1>
    <form id="uploadForm">
        <div class="form-group">
            <label for="name">Nombre del Catálogo (ej. Colección Verano):</label>
            <input type="text" id="name" name="name" required placeholder="Nombre descriptivo">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label for="month">Mes:</label>
                <select id="month" name="month" required>
                    <option value="Enero">Enero</option>
                    <option value="Febrero">Febrero</option>
                    <option value="Marzo">Marzo</option>
                    <option value="Abril" selected>Abril</option>
                    <option value="Mayo">Mayo</option>
                    <option value="Junio">Junio</option>
                    <option value="Julio">Julio</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Septiembre">Septiembre</option>
                    <option value="Octubre">Octubre</option>
                    <option value="Noviembre">Noviembre</option>
                    <option value="Diciembre">Diciembre</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="year">Año:</label>
                <input type="number" id="year" name="year" value="2026" required>
            </div>
        </div>

        <div class="form-group">
            <label for="files">Seleccionar Imágenes (Puedes elegir varias):</label>
            <input type="file" id="files" name="files" multiple accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="video" style="color: #d32f2f;">📹 Cargar Video (Opcional):</label>
            <input type="file" id="video" name="video" accept="video/mp4,video/x-m4v,video/*">
            <small style="color: #666;">Este video aparecerá al final del catálogo.</small>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Publicar Catálogo</button>
        <div id="loader" class="loader"></div>
    </form>

    <div id="status-message"></div>
</div>

<script>
    const API_BASE = "http://10.100.39.54:8000";

    document.getElementById('uploadForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status-message');
        
        // Bloquear interfaz
        btn.disabled = true;
        loader.style.display = "block";
        status.style.display = "none";

        const formData = new FormData();
        formData.append('name', document.getElementById('name').value);
        formData.append('month', document.getElementById('month').value);
        formData.append('year', document.getElementById('year').value);

        // Agregar imágenes
        const imageFiles = document.getElementById('files').files;
        for (let i = 0; i < imageFiles.length; i++) {
            formData.append('files', imageFiles[i]);
        }

        // Agregar video si existe
        const videoFile = document.getElementById('video').files[0];
        if (videoFile) {
            formData.append('video', videoFile);
        }

        try {
            const response = await fetch(`${API_BASE}/upload-catalog/`, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                status.className = "success";
                status.innerText = "✅ ¡Catálogo publicado con éxito! Ya puedes verlo en la página principal.";
                document.getElementById('uploadForm').reset();
            } else {
                throw new Error(result.detail || "Error al subir archivos");
            }
        } catch (error) {
            status.className = "error";
            status.innerText = "❌ Error: " + error.message;
        } finally {
            status.style.display = "block";
            btn.disabled = false;
            loader.style.display = "none";
        }
    };
</script>

</body>
</html>
